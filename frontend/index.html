<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog MVP</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page">
    <h1>Каталог товаров</h1>

    <section class="toolbar">
      <input id="searchInput" type="text" placeholder="Поиск по бренду или названию" />
      <select id="categorySelect">
        <option value="">Все общие категории</option>
      </select>
      <select id="brandSelect">
        <option value="">Все бренды</option>
      </select>
      <select id="statusSelect">
        <option value="active">Только активные</option>
        <option value="all">Все статусы</option>
        <option value="sold">Проданные</option>
        <option value="missing">Missing</option>
      </select>
      <button id="reloadButton" type="button">Обновить</button>
    </section>

    <p id="statusText">Загрузка...</p>
    <section id="productsGrid" class="products-grid"></section>
    <section class="pagination">
      <button id="prevPageButton" type="button">← Назад</button>
      <span id="pageInfoText">Страница 1</span>
      <button id="nextPageButton" type="button">Вперёд →</button>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
